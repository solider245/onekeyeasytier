# 服务器节点配置模板
# 适合作为中心服务器的配置

[network]
name = "EasyTier-Server-Network"
ipv4_cidr = "10.0.0.0/16"
ipv6_cidr = "fd00:2024::/64"

[peers]
# 服务器通常不需要连接其他节点
# 客户端会连接到这个服务器

[dhcp]
enabled = true
ipv4_pool = "10.0.1.100-10.0.1.200"
ipv6_pool = "fd00:2024::100-fd00:2024::200"

[routing]
enabled = true
table = 100
table_priority = 1000

[nat]
enabled = false

dev_name = "easytier0"